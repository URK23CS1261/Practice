name : GIT CI
on:
    push:
        branches: [main]

    pull_request:
        branches: [main]

jobs:
    build-test:
        runs-on: ubuntu-latest

        steps:
            - name : checkout repo
              uses: actions/checkout@v4
            
            - name: Setup python
              uses : actions/setup-python@v5

              with:
                python-version : "3.12"

            - name : Install Dependencies
              run  : pip install -r requirements.txt

            - name : Run Pytest
              run  : pytest test_app.py -v 


