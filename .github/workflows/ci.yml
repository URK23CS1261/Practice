name: CI for pytest

on: 
    push: 
        branches : [ main ]
    pull_request:
        branches: [ main ]

jobs:
    build-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout to latest code
              uses: actions/checkout@v3
            - name: Setup python
              uses: actions/setup-python@v4
              with:
                python-version: '3.11'
            - name: Install Requirements
              run: pip install -r requirements.txt
            - name: Run tests
              run: pytest test_app.py -v